            if (!val) return '';
            // String ISO ou YYYY-MM-DD
            if (typeof val === 'string') {
                if (val.includes('T')) return val.split('T')[0];
                if (val.match(/^\d{4}-\d{2}-\d{2}/)) return val.substring(0, 10);
                // DD/MM/YYYY
                if (val.includes('/')) {

                return val;

            // Número serial Excel (dias desde 1900)

            }
            return '';

                    alert('Preenche todos os campos.'); return;
                }
                const mins = calcMin(formPert.horaInicio, formPert.horaFim);
                const duracao = `${Math.floor(mins/60)}h ${mins%60}min`;
                const novas = perturbacoes.map(p => String(p.id) === String(editandoPert)
                    ? { ...p, tipo: formPert.tipo, horaInicio: formPert.horaInicio, horaFim: formPert.horaFim, duracao }
                    : p
                );
                try {
                    await fetch(CONFIG.URL_ALTERAR, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: String(editandoPert), tabela: 'Perturbações',
                            'Tipo Perturbação': formPert.tipo, 'Hora Início': formPert.horaInicio,
                            'Hora Fim': formPert.horaFim, 'Duração': duracao })
                    });
                } catch(e) { console.log('Erro ao editar perturbação:', e); }
                setPerturbacoes(novas);
                localStorage.setItem('adminPerturbacoes', JSON.stringify(novas));
                const nomeLower = modalDados.colab.toLowerCase();
                setModalDados({ ...modalDados, perturbacoes: novas.filter(p => p.colaborador.toLowerCase() === nomeLower && p.data === modalDados.data) });
                setEditandoPert(null);
                setFormPert({ tipo: '', horaInicio: '', horaFim: '' });
                alert('✅ Perturbação atualizada!');
            };
            const guardarMapaAuto = async (mes, registosData, forcar = false) => {
                const guardados = JSON.parse(localStorage.getItem('adminMesesGuardados') || '[]');
                // Se não forçar, verificar se já foi guardado
                if (!forcar) {
                    if (guardados.includes(mes)) {
                        console.log('Mês', mes, 'já guardado, ignorando...');
                        return;
                    }
                }
                
                const [ano, mesNum] = mes.split('-');
                const ultimoDia = new Date(ano, mesNum, 0).getDate();
                
                // Calcular horas para cada colaborador
                const calcHorasData = (nome, data, regs) => {
                    let m = 0;
                    const nomeLower = nome.toLowerCase();
                    regs.filter(r => r.colaborador.toLowerCase() === nomeLower && r.data === data).forEach(r => {
                        const [h1, m1] = (r.horaInicio || '').split(':').map(Number);
                        const [h2, m2] = (r.horaFim || '').split(':').map(Number);
                        if (!isNaN(h1) && !isNaN(h2)) {
                            m += (h2 * 60 + m2) - (h1 * 60 + m1);
                        }
                    });
                    return m / 60;
                };
                
                const dados = colaboradores.map(c => {
                    const row = { Colaborador: c.nome, Mes: mes };
                    let total = 0;
                    for (let d = 1; d <= 31; d++) {
                        const data = mes + '-' + String(d).padStart(2, '0');
                        const h = d <= ultimoDia ? calcHorasData(c.nome, data, registosData) : 0;
                        row[String(d)] = h > 0 ? h.toFixed(1) : '';
                        total += h;
                    }
                    row['Total'] = total.toFixed(1);
                    return row;
                });
                
                // Só guardar se houver dados (total > 0)
                const temDados = dados.some(d => parseFloat(d.Total) > 0);
                if (!temDados) {
                    console.log('Mês', mes, 'sem dados, ignorando...');
                    return;
                }
                
                // Marcar como guardado ANTES de enviar para evitar duplicados
                const novosGuardados = [...guardados, mes];
                setMesesGuardados(novosGuardados);
                localStorage.setItem('adminMesesGuardados', JSON.stringify(novosGuardados));
                
                try {
                    await fetch(CONFIG.URL_GUARDAR_MAPA, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mes, dados, substituir: true })
                    });
                    console.log('Mapa', mes, 'guardado!');
                } catch (e) {
                    console.log('Erro ao guardar mapa (pode ter funcionado):', e);
                }
            };

            // Função para escrever no Excel via Power Automate
            const escreverConfig = async (acao, tabela, dados) => {
                try {
                    console.log('📤 escreverConfig:', JSON.stringify({ acao, tabela, dados }));
                    const resp = await fetch(CONFIG.URL_ESCREVER_CONFIG, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ acao, tabela, dados })
                    });
                    console.log('📥 escreverConfig resposta status:', resp.status);
                    try {
                        const txt = await resp.text();
                        console.log('📥 escreverConfig resposta body:', txt.substring(0, 500));
                    } catch(e2) {}
                    return true;
                } catch (e) {
                    console.log('❌ Erro ao escrever:', e);
                    return false;
                }
            };

            // Adicionar novo registo de produção
            const adicionarRegisto = async () => {
                if (!formNovo.artigo || !formNovo.horaInicio || !formNovo.horaFim) {
                    alert('⚠️ Preenche artigo, hora início e hora fim.');
                    return;
                }
                setLoading(true);
                try {
                    const id = String(Date.now());
                    const mins = calcMin(formNovo.horaInicio, formNovo.horaFim);
                    const duracao = `${Math.floor(mins/60)}h ${mins%60}min`;
                    
                    // Enviar para Power Automate (mesmo formato da app de produção)
                    try {
                        await fetch(CONFIG.URL_ADICIONAR_PROD, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                ID: id,
                                Data: modalDados.data,
                                Artigo: formNovo.artigo,
                                TipoCaixa: formNovo.tipoCaixa || '',
                                Operacao: formNovo.operacao || '',
                                UnidadeProducao: formNovo.unidade || '',
                                Colaborador: modalDados.colab,
                                HoraInicio: formNovo.horaInicio,
                                HoraFim: formNovo.horaFim,
                                Duracao: duracao,
                                Comentarios: formNovo.comentarios || '',
                                DataHoraRegisto: new Date().toLocaleString('pt-PT')
                            })
                        });
                    } catch (e) {
                        console.log('Adicionar prod (provavelmente executou):', e.message);
                    }
                    
                    // Adicionar localmente
                    const novoReg = {
                        id,
                        data: modalDados.data,
                        artigo: formNovo.artigo,
                        tipoCaixa: formNovo.tipoCaixa || '',
                        operacao: formNovo.operacao || '',
                        unidade: formNovo.unidade || '',
                        colaborador: modalDados.colab,
                        horaInicio: formNovo.horaInicio,
                        horaFim: formNovo.horaFim,
                        duracao,
                        comentarios: formNovo.comentarios || ''
                    };
                    const novos = [...registos, novoReg];
                    setRegistos(novos);
                    localStorage.setItem('adminRegistos', JSON.stringify(novos));
                    
                    // Atualizar modal
                    const nomeLower = modalDados.colab.toLowerCase();
                    setModalDados({
                        ...modalDados,
                        registos: novos.filter(r => r.colaborador.toLowerCase() === nomeLower && r.data === modalDados.data)
                    });
                    
                    setAdicionando(false);
                    setFormNovo({});
                    alert('✅ Registo adicionado!');
                } catch (error) {
                    console.error('Erro ao adicionar:', error);
                    alert('❌ Erro ao adicionar registo.');
                }
                setLoading(false);
            };

            // Carregar encomendas (pendentes + terminadas)
            const carregarEncomendas = async () => {
                setLoadingEnc(true);
                try {
                    const processarDados = (dados) => {
                        return (Array.isArray(dados) ? dados : dados.value || []).map(row => ({
                            caixa: row.Caixa || row['Caixa'] || '',
                            tipologia: row.Tipologia || '',
                            estado: row.Estado || '',
                            subEstado: row.SubEstado || '',
                            dataProducao: row['Data Produção'] || row.DataProducao || row['Data Producao'] || '',
                            dataEmbalamento: row['Data Embalamento'] || row.DataEmbalamento || '',
                            numSerie: row['Nº série'] || row.NumSerie || row['Nº serie'] || row['NumSerie'] || ''
                        }));
                    };
                    
                    // Carregar pendentes
                    let pendentes = [];
                    try {
                        const resp1 = await fetch(CONFIG.URL_LER_ENCOMENDAS, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({})
                        });
                        pendentes = processarDados(await resp1.json());
                        console.log('Encomendas pendentes:', pendentes.length);
                    } catch (e) { console.log('Erro pendentes:', e.message); }
                    
                    // Carregar terminadas
                    let terminadas = [];
                    try {
                        const resp2 = await fetch(CONFIG.URL_LER_TERMINADAS, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({})
                        });
                        const raw2 = await resp2.json();
                        terminadas = processarDados(raw2);
                        console.log('Encomendas terminadas:', terminadas.length);
                        // DEBUG: mostrar formatos de data das primeiras 5 com dataProducao
                        const comData = terminadas.filter(e => e.dataProducao).slice(0, 5);
                        console.log('DEBUG datas terminadas:', comData.map(e => ({ caixa: e.caixa, dataProd: e.dataProducao, dataEmb: e.dataEmbalamento, tipo: typeof e.dataProducao })));
                    } catch (e) { console.log('Erro terminadas:', e.message); }
                    
                    const todas = [...pendentes, ...terminadas];
                    console.log('Total encomendas:', todas.length);
                    setEncomendas(todas);
                } catch (e) {
                    console.log('Erro encomendas:', e.message);
                }
                setLoadingEnc(false);
            };

            // Cruzar produção com encomendas (aceita array de datas para encomendas)
            const cruzarDados = (datasEncArr, dataRegistos) => {
                const normalize = s => s.replace(/\s+/g, ' ').trim().toLowerCase();
                
                const convertDate = (dp) => {
                    if (!dp || dp === 'sem data') return '';
                    if (typeof dp === 'number') {
                        const d = new Date((dp - 25569) * 86400000);
                        return d.toISOString().split('T')[0];
                    }
                    if (typeof dp === 'string') {
                        if (/^\d{4,5}$/.test(dp.trim())) {
                            const num = parseInt(dp.trim());
                            const d = new Date((num - 25569) * 86400000);
                            return d.toISOString().split('T')[0];
                        }
                        if (dp.includes('/')) {
                            const p = dp.split('/');
                            if (p[2]?.length === 4) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
                        }
                        if (dp.includes('T')) return dp.split('T')[0];
                        if (dp.match(/^\d{4}-\d{2}-\d{2}/)) return dp.substring(0, 10);
                    }
                    return '';
                };
                
                const datasSet = new Set(datasEncArr);
                
                const produzidas = {};
                const embaladas = {};
                
                encomendas.forEach(e => {
                    const dprod = convertDate(e.dataProducao);
                    const demb = convertDate(e.dataEmbalamento);
                    const key = normalize(e.caixa);
                    
                    if (dprod && datasSet.has(dprod)) {
                        if (!produzidas[key]) produzidas[key] = { nome: e.caixa, count: 0, series: [], datas: new Set() };
                        produzidas[key].count++;
                        produzidas[key].datas.add(dprod);
                        if (e.numSerie) produzidas[key].series.push(e.numSerie);
                    }
                    if (demb && datasSet.has(demb)) {
                        if (!embaladas[key]) embaladas[key] = { nome: e.caixa, count: 0, series: [], datas: new Set() };
                        embaladas[key].count++;
                        embaladas[key].datas.add(demb);
                        if (e.numSerie) embaladas[key].series.push(e.numSerie);
                    }
                });
                
                const regsDia = registos.filter(r => r.data === dataRegistos);
                const regsPorArtigo = {};
                regsDia.forEach(r => {
                    const key = normalize(r.artigo);
                    if (!regsPorArtigo[key]) regsPorArtigo[key] = { nome: r.artigo, operacoes: {}, colaboradores: new Set(), totalMin: 0, count: 0 };
                    regsPorArtigo[key].count++;
                    const op = r.operacao || 'Sem operação';
                    if (!regsPorArtigo[key].operacoes[op]) regsPorArtigo[key].operacoes[op] = 0;
                    regsPorArtigo[key].operacoes[op]++;
                    regsPorArtigo[key].colaboradores.add(r.colaborador);
                    regsPorArtigo[key].totalMin += calcMin(r.horaInicio, r.horaFim);
                });
                
                return { produzidas, embaladas, regsPorArtigo };
            };

            // Calcular horas
            const calcHorasReg = (nome, data) => {
                let m = 0;
                const nomeLower = nome.toLowerCase();
                registos.filter(r => r.colaborador.toLowerCase() === nomeLower && r.data === data).forEach(r => {
                    m += calcMin(r.horaInicio, r.horaFim);
                });
                perturbacoes.filter(p => p.colaborador.toLowerCase() === nomeLower && p.data === data).forEach(p => {
                    m += calcMin(p.horaInicio, p.horaFim);
                });
                return m / 60;
            };

            const getStatusDia = (colab, data) => {
                // Após data de saída
                if (colab.dataSaida && data > colab.dataSaida) return 'saida';
                const ds = getDiaSemana(data);
                if (eFeriado(data) || feriados.find(f => f.data === data)) return 'feriado';
                const ausenciaMatch = ausencias.find(a => a.nome === colab.nome && data >= a.dataInicio && data <= a.dataFim);
                if (ausenciaMatch) return (ausenciaMatch.tipo || '').toLowerCase().includes('ferias') || (ausenciaMatch.tipo || '').toLowerCase().includes('férias') ? 'ferias' : 'ausencia';
                if (ferias.find(f => f.nome === colab.nome && f.dataInicio === data)) return 'ferias';
                if (ferias.find(f => f.nome === colab.nome && f.dataInicio === data)) return 'ferias';
                if (ds === 'sab' || ds === 'dom') return 'fds';
                if (!colab.dias?.includes(ds)) return 'folga';
                
                const horas = calcHorasReg(colab.nome, data);
                const horasEsperadas = TURNOS[colab.turno]?.horas || 8;
                
                if (horas >= horasEsperadas) return 'completo';
                if (horas > 0) return 'parcial';
                return 'semregisto';
            };

            // Gerar dias do período
            const diasPeriodo = useMemo(() => {
                const dias = [];
                let d = new Date(diaInicio);
                const fim = new Date(diaFim);
                while (d <= fim) {
                    dias.push(d.toISOString().split('T')[0]);
                    d.setDate(d.getDate() + 1);
                }
                return dias;
            }, [diaInicio, diaFim]);

            // Registos do dia
            const regsDia = useMemo(() => registos.filter(r => r.data === dataAtual), [registos, dataAtual]);
            const pertsDia = useMemo(() => perturbacoes.filter(p => p.data === dataAtual), [perturbacoes, dataAtual]);

            // Por tipo
            const porTipo = useMemo(() => {
                const r = {};
                regsDia.forEach(reg => {
                    const t = reg.tipoCaixa || 'Outro';
                    if (!r[t]) r[t] = { ops: 0, min: 0, regs: [] };
                    r[t].ops++;
                    r[t].min += calcMin(reg.horaInicio, reg.horaFim);
                    r[t].regs.push(reg);
                });
                return r;
            }, [regsDia]);

            // ============================================================
            // RENDER
            // ============================================================
            return (
                <div style={{ minHeight: '100vh', background: '#0f172a' }}>
                    {/* Header */}
                    <div style={{ background: '#1e293b', padding: '15px 20px', borderBottom: '1px solid #334155' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                            <div>
                                <h1 style={{ margin: 0, fontSize: '18px', color: '#e2e8f0' }}>⚙️ Administração</h1>
                                <p style={{ margin: '3px 0 0 0', color: '#64748b', fontSize: '11px' }}>
                                    {ultimaSync ? `Sync: ${ultimaSync}` : 'Clique Sync para carregar'}
                                    {registos.length > 0 && ` • ${registos.length} registos`}
                                </p>
                            </div>
                            <button className="btn btn-primary" onClick={carregarDados} disabled={loading} style={{ padding: '8px 16px' }}>
                                {loading ? '⏳ A carregar...' : '🔄 Sync'}
                            </button>
                        </div>
                    </div>

                    {/* Tabs */}
                    <div className="tab-bar">
                        <button className={tab === 'resumo' ? 'active' : ''} onClick={() => setTab('resumo')}>📊 Resumo</button>
                        <button className={tab === 'calendario' ? 'active' : ''} onClick={() => setTab('calendario')}>📅 Calendário</button>
                        <button className={tab === 'horas' ? 'active' : ''} onClick={() => setTab('horas')}>🕐 Horas</button>
                        <button className={tab === 'matriz' ? 'active' : ''} onClick={() => setTab('matriz')}>📦 Matriz</button>
                        <button className={tab === 'equipa' ? 'active' : ''} onClick={() => setTab('equipa')}>👥 Equipa</button>
                        <button className={tab === 'ausencias' ? 'active' : ''} onClick={() => setTab('ausencias')}>🏖️ Férias & Ausências</button>
                        <button className={tab === 'pins' ? 'active' : ''} onClick={() => setTab('pins')}>🔑 PINs</button>
                        <button className={tab === 'cruzamento' ? 'active' : ''} onClick={() => { setTab('cruzamento'); if (encomendas.length === 0) carregarEncomendas(); }}>🔄 Produção vs Enc.</button>
                    </div>

                    <div style={{ padding: '15px' }}>
                        {/* ==================== RESUMO ==================== */}
                        {tab === 'resumo' && (
                            <div>
                                <div className="card">
                                    <div className="mb-2">
                                        <label className="label">📅 Data</label>
                                        <input type="date" className="input" value={dataAtual} onChange={e => setDataAtual(e.target.value)} />
                                    </div>
                                    
                                    <div className="grid-2 mb-2">
                                        <div style={{ background: '#0f172a', padding: '12px', borderRadius: '8px', textAlign: 'center' }}>
                                            <div style={{ fontSize: '24px', fontWeight: '700', color: '#3b82f6' }}>{regsDia.length}</div>
                                            <div style={{ fontSize: '11px', color: '#64748b' }}>Operações</div>
                                        </div>
                                        <div style={{ background: '#0f172a', padding: '12px', borderRadius: '8px', textAlign: 'center' }}>
                                            <div style={{ fontSize: '24px', fontWeight: '700', color: '#ef4444' }}>{pertsDia.length}</div>
                                            <div style={{ fontSize: '11px', color: '#64748b' }}>Perturbações</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Por tipo de caixa */}
                                {Object.keys(porTipo).length > 0 ? (
                                    Object.entries(porTipo).map(([tipo, d]) => {
                                        const t = TIPOS.find(x => x.id === tipo);
                                        return (
                                            <div key={tipo} className="card" style={{ padding: 0, overflow: 'hidden' }}>
                                                <div style={{ background: '#334155', padding: '10px 12px', display: 'flex', justifyContent: 'space-between' }}>
                                                    <span style={{ fontWeight: '600', color: t?.cor || '#e2e8f0' }}>{t?.icon} {t?.nome || tipo}</span>
                                                    <span>{d.ops} ops • {Math.floor(d.min/60)}h {d.min%60}m</span>
                                                </div>
                                                {d.regs.map((r, i) => (
                                                    <div key={i} style={{ padding: '8px 12px', borderBottom: '1px solid #334155', fontSize: '12px' }}>
                                                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                                            <span style={{ fontWeight: '600' }}>{r.artigo}</span>
                                                            <span style={{ color: '#64748b' }}>{r.horaInicio}-{r.horaFim}</span>
                                                        </div>
                                                        <div style={{ color: '#94a3b8', fontSize: '11px' }}>{r.operacao}</div>
                                                        <div style={{ color: '#64748b', fontSize: '11px' }}>{r.colaborador}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="card" style={{ textAlign: 'center', padding: '30px', color: '#64748b' }}>
                                        {registos.length === 0 ? '⚠️ Clique em Sync para carregar dados' : '📭 Sem registos neste dia'}
                                    </div>
                                )}

                                {/* Perturbações do dia */}
                                {pertsDia.length > 0 && (
                                    <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
                                        <div style={{ background: '#991b1b', padding: '10px 12px' }}>
                                            <span style={{ fontWeight: '600' }}>⚠️ Perturbações ({pertsDia.length})</span>
                                        </div>
                                        {pertsDia.map((p, i) => (
                                            <div key={i} style={{ padding: '8px 12px', borderBottom: '1px solid #334155', fontSize: '12px' }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                                    <span style={{ fontWeight: '600' }}>{p.tipo}</span>
                                                    <span style={{ color: '#64748b' }}>{p.horaInicio}-{p.horaFim}</span>
                                                </div>
                                                <div style={{ color: '#64748b', fontSize: '11px' }}>{p.colaborador}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ==================== CALENDÁRIO ==================== */}
                        {tab === 'calendario' && (
                            <div>
                                <div className="card">
                                    <div className="grid-3 mb-2">
                                        <div>
                                            <label className="label">De</label>
                                            <input type="date" className="input" value={diaInicio} onChange={e => setDiaInicio(e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="label">Até</label>
                                            <input type="date" className="input" value={diaFim} onChange={e => setDiaFim(e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="label">Mês</label>
                                            <input type="month" className="input" value={mesAtual} onChange={e => setMesAtual(e.target.value)} />
                                        </div>
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', fontSize: '10px' }}>
                                        <span>🟢 Completo</span>
                                        <span>🟡 Parcial</span>
                                        <span>🔴 Sem registo</span>
                                        <span>🔵 Ausência</span>
                                        <span>🏖️ Férias</span>
                                        <span>🟣 Feriado</span>
                                        <span>⚫ FDS/Folga</span>
                                        <span>░ Fora da empresa</span>
                                    </div>
                                </div>

                                <div className="card" style={{ overflow: 'auto', maxHeight: '70vh' }}>
                                    <table>
                                        <thead>
                                            <tr>
                                                <th className="nome-col">Nome</th>
                                                {diasPeriodo.map(d => (
                                                    <th key={d} style={{ minWidth: '28px', fontSize: '10px' }}>
                                                        {d.slice(8)}<br/>
                                                        <span style={{ color: '#64748b' }}>{getDiaSemana(d).charAt(0).toUpperCase()}</span>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {colaboradores.filter(c => c.ativo || diasPeriodo.some(d => registos.some(r => r.colaborador.toLowerCase() === c.nome.toLowerCase() && r.data === d))).map((colab, i) => (
                                                <tr key={i}>
                                                    <td className="nome-col" style={{ fontSize: '11px' }}>
                                                        {colab.nome.split(' ')[0]} {colab.nome.split(' ').slice(-1)[0]}
                                                    </td>
                                                    {diasPeriodo.map(d => {
                                                        const status = getStatusDia(colab, d);
                                                        const horas = calcHorasReg(colab.nome, d);
                                                        let cls = 'cel-cinza';

                                                }} style={{ padding: '8px', fontSize: '12px' }}>
                                                    <option value="">Selecionar artigo...</option>
                                                    {ARTIGOS.filter(a => !formNovo.tipoCaixa || a.tipo === formNovo.tipoCaixa).map(a => <option key={a.artigo} value={a.artigo}>{a.artigo}</option>)}
                                                </select>
                                            </div>
                                            <div style={{ marginBottom: '8px' }}>
                                                <label style={{ fontSize: '11px', color: '#a7f3d0' }}>Operação</label>
                                                <select className="input" value={formNovo.operacao || ''} onChange={e => setFormNovo({...formNovo, operacao: e.target.value})} style={{ padding: '8px', fontSize: '12px' }}>
                                                    <option value="">Selecionar operação...</option>
                                                    {operacoesConfig.filter(op => !formNovo.artigo || !op.artigos || op.artigos.includes(formNovo.artigo)).map(op => <option key={op.operacao} value={op.operacao}>{op.operacao}</option>)}
                                                </select>
                                            </div>
                                            <div style={{ marginBottom: '8px' }}>
                                                <label style={{ fontSize: '11px', color: '#a7f3d0' }}>Unidade Produção</label>
                                                <select className="input" value={formNovo.unidade || ''} onChange={e => setFormNovo({...formNovo, unidade: e.target.value})} style={{ padding: '8px', fontSize: '12px' }}>
                                                    <option value="">Selecionar unidade...</option>
                                                    <option value="Evora1-Montagem">Evora1-Montagem</option>
                                                    <option value="Evora1-Soldadura">Evora1-Soldadura</option>
                                                    <option value="Evora1-Embalamento">Evora1-Embalamento</option>
                                                    <option value="Transportes">Transportes</option>
                                                </select>
                                            </div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px', marginBottom: '8px' }}>
                                                <div>
                                                    <label style={{ fontSize: '11px', color: '#a7f3d0' }}>Hora Início</label>
                                                    <input type="time" className="input" value={formNovo.horaInicio || ''} onChange={e => setFormNovo({...formNovo, horaInicio: e.target.value})} style={{ padding: '8px', fontSize: '12px' }} />
                                                </div>
                                                <div>
                                                    <label style={{ fontSize: '11px', color: '#a7f3d0' }}>Hora Fim</label>
                                                    <input type="time" className="input" value={formNovo.horaFim || ''} onChange={e => setFormNovo({...formNovo, horaFim: e.target.value})} style={{ padding: '8px', fontSize: '12px' }} />
                                                </div>
                                            </div>
                                            <div style={{ marginBottom: '8px' }}>
                                                <label style={{ fontSize: '11px', color: '#a7f3d0' }}>Comentários</label>
                                                <input className="input" value={formNovo.comentarios || ''} onChange={e => setFormNovo({...formNovo, comentarios: e.target.value})} placeholder="Opcional" style={{ padding: '8px', fontSize: '12px' }} />
                                            </div>
                                            <div style={{ display: 'flex', gap: '8px' }}>
                                                <button className="btn" style={{ background: '#059669', color: 'white', flex: 1, padding: '8px', fontSize: '12px' }} onClick={adicionarRegisto} disabled={loading}>
                                                    {loading ? '⏳' : '💾'} Guardar
                                                </button>
                                                <button className="btn btn-secondary" style={{ padding: '8px', fontSize: '12px' }} onClick={() => { setAdicionando(false); setFormNovo({}); }}>
                                                    Cancelar
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                    
                                    {/* Perturbações */}
                                    <div style={{ marginTop: '15px', borderTop: '1px solid #334155', paddingTop: '15px' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                                            <div style={{ color: '#ef4444', fontSize: '13px', fontWeight: '600' }}>
                                                ⚠️ Perturbações ({(modalDados.perturbacoes || []).length})
                                            </div>
                                            <button className="btn btn-danger" style={{ padding: '4px 10px', fontSize: '11px' }}
                                                onClick={() => { setAdicionandoPert(!adicionandoPert); setEditandoPert(null); setFormPert({ tipo: '', horaInicio: '', horaFim: '' }); }}>
                                                {adicionandoPert ? '✕ Cancelar' : '➕ Nova'}
                                            </button>
                                        </div>

                                        {/* Formulário adicionar */}
                                        {adicionandoPert && (
                                            <div style={{ background: '#1e1e2e', border: '1px solid #ef4444', borderRadius: '8px', padding: '10px', marginBottom: '10px' }}>
                                                <div style={{ fontSize: '12px', fontWeight: '600', color: '#fca5a5', marginBottom: '8px' }}>Nova Perturbação</div>
                                                <select className="input mb-2" value={formPert.tipo} onChange={e => setFormPert({...formPert, tipo: e.target.value})} style={{ padding: '6px', fontSize: '12px' }}>
                                                    <option value="">Tipo...</option>
                                                    {tiposPerturbacao.map((t, i) => <option key={i} value={t}>{t}</option>)}
                                                </select>
                                                <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
                                                    <input type="time" className="input" value={formPert.horaInicio} onChange={e => setFormPert({...formPert, horaInicio: e.target.value})} style={{ flex: 1, padding: '6px', fontSize: '12px' }} />
                                                    <input type="time" className="input" value={formPert.horaFim} onChange={e => setFormPert({...formPert, horaFim: e.target.value})} style={{ flex: 1, padding: '6px', fontSize: '12px' }} />
                                                </div>
                                                <button className="btn btn-danger" style={{ width: '100%', padding: '6px', fontSize: '12px' }} onClick={adicionarPerturbacao}>
                                                    💾 Guardar Perturbação
                                                </button>
                                            </div>
                                        )}

                                        {/* Lista de perturbações */}
                                        {(modalDados.perturbacoes || []).map((p, i) => (
                                            <div key={p.id || i} style={{ background: '#450a0a', borderRadius: '8px', padding: '10px', marginBottom: '6px' }}>
                                                {editandoPert === String(p.id) ? (
                                                    <div>
                                                        <select className="input mb-2" value={formPert.tipo} onChange={e => setFormPert({...formPert, tipo: e.target.value})} style={{ padding: '6px', fontSize: '12px' }}>
                                                            <option value="">Tipo...</option>
                                                            {tiposPerturbacao.map((t, i) => <option key={i} value={t}>{t}</option>)}
                                                        </select>
                                                        <div style={{ display: 'flex', gap: '6px', marginBottom: '8px' }}>
                                                            <input type="time" className="input" value={formPert.horaInicio} onChange={e => setFormPert({...formPert, horaInicio: e.target.value})} style={{ flex: 1, padding: '6px', fontSize: '12px' }} />
                                                            <input type="time" className="input" value={formPert.horaFim} onChange={e => setFormPert({...formPert, horaFim: e.target.value})} style={{ flex: 1, padding: '6px', fontSize: '12px' }} />
                                                        </div>
                                                        <div style={{ display: 'flex', gap: '4px' }}>
                                                            <button className="btn btn-success" style={{ flex: 1, padding: '4px', fontSize: '11px' }} onClick={guardarEdicaoPerturbacao}>💾 Guardar</button>
                                                            <button className="btn btn-secondary" style={{ padding: '4px 8px', fontSize: '11px' }} onClick={() => { setEditandoPert(null); setFormPert({ tipo: '', horaInicio: '', horaFim: '' }); }}>✕</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                                        <div style={{ flex: 1 }}>
                                                            <div style={{ fontWeight: '600', fontSize: '13px', color: '#fca5a5' }}>{p.tipo}</div>
                                                            <div style={{ color: '#f87171', fontSize: '12px', marginTop: '4px' }}>
                                                                {p.horaInicio} - {p.horaFim} ({p.duracao || calcMin(p.horaInicio, p.horaFim) + 'min'})
                                                            </div>
                                                        </div>
                                                        <div style={{ display: 'flex', gap: '4px' }}>
                                                            <button className="btn btn-primary" style={{ padding: '4px 8px', fontSize: '10px' }} onClick={() => {
                                                                setEditandoPert(String(p.id));
                                                                setAdicionandoPert(false);
                                                                setFormPert({ tipo: p.tipo, horaInicio: p.horaInicio, horaFim: p.horaFim });
                                                            }}>✏️</button>
                                                            <button className="btn btn-danger" style={{ padding: '4px 8px', fontSize: '10px' }} onClick={() => eliminarPerturbacao(p.id)}>🗑️</button>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <script>
        // Registar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw-admin.js')
                .then(reg => console.log('SW Admin registado:', reg.scope))
                .catch(err => console.log('SW Admin erro:', err));
        }
    </script>
</body>
</html>
